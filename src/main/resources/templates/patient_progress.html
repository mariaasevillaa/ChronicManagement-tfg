<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient progress</title>
    <link rel="stylesheet" href="/images/dashboard_pa.css">
</head>
<body>
<article id="background">
    <div class="progress">
        <form action="/patient_progress" method="get">
        <h1 class="header_progress"> Your progress over time </h1>
        <h2 class="header3_progress"> Track your daily reports, mood and medication adherence</h2>
            <div class="progress-row">
            <p class="box-progress"><span th:text="${Totalreports}"></span><br>Reports submitted</p>
            <p class="box-progress"><span th:text="${Averagemood}+ '/5'"></span><br>Average mood</p>
            <p class="box-progress"><span th:text="${Averagemedicationtaken}"></span><br>Medication adherence</p>
            </div>
            <h2 class="header3_progress">Health chart </h2>

                <div class="range-button">
                    <button type="button" class="button-chart" onclick="updateChart('days')"> Days</button>
                    <button type="button" class="button-chart" onclick="updateChart('weeks')"> Weeks</button>
                    <button type="button" class="button-chart" onclick="updateChart('months')"> Months <br></button>
                </div>


            <div class=" chart" >
                <canvas id="healthChart"></canvas>

            </div>

            <a class="return_dashboard" href="/patient_dashboard">Back to dashboard</a>
        </form>

    </div>
    <div class="top">
        <a href="/patient_profile" th:text="${name}" class="name"></a>
        <a href="/logout" class="logout">| Log out</a>
    </div>
    <img src="/images/logo2.png" class="logo">
    <img src="/images/silueta.png" class="icono1">
</article>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    const chartData = {
        days: {
            labels: [[${dayslabels}]],
            moodvalues: [[${daysvalues}]],
            medicationvalues: [[${medicationdays}]]
        },
        weeks: {
            labels: [[${weekslabels}]],
            moodvalues: [[${weeksvalues}]],
            medicationvalues:[[${medicationweeks}]]
        },
        months: {
            labels: [[${monthslabels}]],
            moodvalues: [[${monthsvalues}]],
            medicationvalues:[[${medicationmonths}]]
        }
    };

    const ctx = document.getElementById('healthChart').getContext('2d');

    const healthChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: chartData.days.labels,
            datasets: [
                {
                    label: 'Mood',
                    data: chartData.days.moodValues,
                    borderWidth: 2,
                    tension: 0.3,
                    yAxisID: 'yMood',
                    pointRadius: 4,
                    pointHoverRadius: 6
                },
                {
                    label: 'Medication',
                    data:chartData.days.medicationValues,
                    borderWidth: 2,
                    tension: 0.3,
                    yAxisID: 'yMedication',
                    pointRadius: 5,
                    pointHoverRadius: 7
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                yMood: {
                    type: 'linear',
                    position: 'left',
                    min: 1,
                    max: 5,
                    ticks: {
                        stepSize: 1
                    },
                    title: {
                        display: true,
                        text: 'Mood'
                    }
                },
                yMedication: {
                    type: 'linear',
                    position: 'right',
                    min: -0.2,
                    max: 1.2,
                    ticks: {
                        stepSize: 1,
                        callback: function(value) {
                            if (value === 1) return 'Yes';
                            if (value === 0) return 'No';
                            return '';
                        }
                    },
                    title: {
                        display: true,
                        text: 'Medication'
                    },
                    grid: {
                        drawOnChartArea: false
                    }
                }
            }
        }
    });

    function updateChart(range) {
        healthChart.data.labels = chartData[range].labels;
        healthChart.data.datasets[0].data = chartData[range].moodvalues;
        healthChart.data.datasets[1].data = chartData[range].medicationvalues;
        healthChart.update();
    }
</script>




</body>
</html>
