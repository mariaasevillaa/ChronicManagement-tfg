<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/images/main1.css">
</head>
<body>
<article id="background">
        <img src="/images/silueta.png" class="perfil">
        <form action="/login" method="post" class="auth-form">
            <section class="login">
                <h1 class="header-login">Welcome back !<br> Sign in to continue</h1>
                <label >Email<br></label>
                <input type="email" name="email" class="login-button" required>

                <label>Password <br></label>
                <input type="password" name="password" class="login-button"  required>
                <a href="/forgot_password" class="forgot-password" style="color: black"> Forgot password? <strong><span  style="color: #69443c" >Reset</span></strong></a>

                <button type="submit" class="submit-login">Log in</button>

                <a href="/register" class="acount"> You don't have an account?<strong><span  style="color: #69443c" >Create account</span></strong> </a>
            </section>
        </form>

    <img src="/images/logo2.png" class="logo">
</article>
</body>
</html>
