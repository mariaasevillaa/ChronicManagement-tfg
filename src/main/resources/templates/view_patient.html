<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>view patient</title>
  <link rel="stylesheet" href="/images/dashboard_hp1.css">
</head>
<body>
<article id="background">
  <div class="viewPatient">

      <h1 class="header3"> Selected patient: <span th:text="${pname}"> </span> <span th:text="${psurname}"> </span></h1>
    <section>
      <h4 class="title-section">PATIENT INFORMATION</h4>
      <div class="info-position">
        <div class="info">
          <p>Full name:
            <span th:text="${pname}"></span> <span th:text="${psurname}"> </span></p>
        </div>
        <div class="info">
          <p>Date of birth: <span th:text="${dob}"> </span></p>
        </div>
         <div class="info">
           <p>Chronic condition: <span th:text="${chronic}"> </span></p>
         </div>
        <div class="info">
          <p>Diagnosis date: <span th:text="${diagnosis}"> </span></p>
        </div>


      </div>

    </section>

    <h4 class="title-section">ACTIONS</h4>
    <section class="pdash_buttons2">
      <form action="review_reports" method="get">
        <input type="hidden" name="patient_id" th:value="${patient_id}">
        <button type="submit" class="option-hp">📋 Review reports</button>
      </form>
      <form action="/progress" method="get">
        <input type="hidden" name="patient_id" th:value="${patient_id}">
        <button type="submit" class="option-hp">📊 View progress</button>
      </form>
      <form action="/patient_alerts" method="get">
        <input type="hidden" name="patient_id" th:value="${patient_id}">
        <button type="submit" class="option-hp">🚨 View alerts</button>
      </form>
      <form action="/configure_parameters" method="get">
        <input type="hidden" name="patient_id" th:value="${patient_id}">
        <button type="submit" class="option-hp">⚙️ Configure parameters</button>
      </form>


    </section>
    <a href="/hp_dashboard" class="return_dashboard">Back to dashboard</a>
    </div>

  <div class="top">
    <span  th:text="${name}" class="name"></span>
    <a href="/logout" class="logout">| Log out</a>
  </div>
  <img src="/images/logo2.png" class="logo">
  <img src="/images/silueta.png" class="icono1">
</article>


</body>
</html>
