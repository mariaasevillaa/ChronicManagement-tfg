<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Reports</title>
    <link rel="stylesheet" href="/images/dashboard_pat.css">
</head>
<body>
<article id="background">
    <div class="report">
        <form action="/daily_reports" method="post">
            <h1 class="header_report">  Daily Well-being report</h1>
            <h2 class="header3_report"> Complete your daily check-in in less than 1 minute</h2>
            <div class="report1">
                <div class="top-row">
                        <label class="section-label">Your mood?</label>
                    <div class="mood-medication">
                        <label class="option-pill"> <input type="radio" name="mood" value="1"><span>Very low</span></label>
                        <label class="option-pill"> <input type="radio" name="mood" value="2"><span> Low</span></label>
                        <label class="option-pill"> <input type="radio" name="mood" value="3"><span>Medium</span></label>
                        <label class="option-pill"> <input type="radio" name="mood" value="4"><span>High</span></label>
                        <label class="option-pill"> <input type="radio" name="mood" value="5"><span>Very high</span></label>

                    </div>
                </div>


                <div class="top-row">
                        <label class="section-label">Medication taken? </label>
                    <div class="mood-medication">
                        <label class="option-pill"> <input type="radio" name="medication_taken" value="0"><span>No</span></label>
                        <label class="option-pill"> <input type="radio" name="medication_taken" value="1"><span>Yes</span></label>

                    </div>

                </div>
                <div class="input">
                    <label class="section-label">Today's date </label>
                    <input type="date" name="date" class="text" required>

                </div>
                <div class="input">
                    <label class="section-label">Comment</label>
                    <input type="text" name="note" class="text" required>
                </div>


            </div>
            <div class="report2">
                <h2 class="header3_report">Select as many symptoms as you have<br>(scroll down to see all of them)</h2>

                <div class="button">
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="1"><span>Fatigue</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="2"><span>Headache</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="3"><span>Dizziness</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="4"><span>Nausea</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="5"><span>Vomiting</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="6"><span>Fever</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="7"><span>Chills</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="8"><span>Muscle pain</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="9"><span>Joint pain</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="10"><span>Abdominal pain</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="11"><span>Chest pain</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="12"><span>Shortness of breath</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="13"><span>Cough</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="14"><span>Palpitations</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="15"><span>Swelling (edema)</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="16"><span>Sleep problems</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="17"><span>Insomnia</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="18"><span>Excessive sleepiness</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="19"><span>Weakness</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="20"><span>Diarrhea</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="21"><span>Constipation</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="22"><span>Loss of appetite</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="23"><span>Anxiety</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="24"><span>Low mood</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="25"><span>Irritability</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="26"><span>Difficulty concentrating</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="27"><span>High blood sugar symptoms</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="28"><span>Low blood sugar symptoms</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="29"><span>High blood pressure symptoms</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="30"><span>Low blood pressure symptoms</span></label>
                    <label class="symptom-pill"><input type="checkbox" name="symptoms" value="31"><span>Other</span></label>
                </div>
            </div>
            <button type="submit" class="report_send">Send</button>
        </form>

    </div>
    <div class="top">
        <a href="/patient_profile" th:text="${name}" class="name"></a>
        <a href="/logout" class="logout">| Log out</a>
    </div>
    <img src="/images/logo2.png" class="logo">
    <img src="/images/silueta.png" class="icono1">

</article>

</body>
</html>
